openapi: 3.0.0
info:
  title: Blog API - INF222 TAF1
  description: API Backend pour gérer les articles d'un blog
  version: 1.0.0

servers:
  - url: https://blog-api-inf222-kv86.onrender.com
    description: Serveur en production (Render)
  - url: http://localhost:3000
    description: Serveur local

tags:
  - name: Articles
    description: Gestion des articles du blog

paths:
  /api/articles:
    get:
      tags: [Articles]
      summary: Récupérer tous les articles
      parameters:
        - in: query
          name: categorie
          schema: { type: string }
          description: Filtrer par catégorie
        - in: query
          name: auteur
          schema: { type: string }
          description: Filtrer par auteur
        - in: query
          name: date
          schema: { type: string, format: date }
          description: Filtrer par date (YYYY-MM-DD)
      responses:
        '200':
          description: Liste des articles
          content:
            application/json:
              schema:
                type: object
                properties:
                  articles:
                    type: array
                    items: { $ref: '#/components/schemas/Article' }
        '500':
          description: Erreur serveur

    post:
      tags: [Articles]
      summary: Créer un nouvel article
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ArticleInput' }
            example:
              titre: "Introduction à Node.js"
              contenu: "Node.js est un environnement d'exécution JavaScript..."
              auteur: "Charles"
              categorie: "Technologie"
              tags: ["nodejs", "javascript", "backend"]
      responses:
        '201':
          description: Article créé
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  article: { $ref: '#/components/schemas/Article' }
        '400':
          description: Données invalides
        '500':
          description: Erreur serveur

  /api/articles/search:
    get:
      tags: [Articles]
      summary: Rechercher des articles
      parameters:
        - in: query
          name: query
          required: true
          schema: { type: string }
          description: Texte à rechercher dans le titre ou le contenu
      responses:
        '200':
          description: Résultats de la recherche
          content:
            application/json:
              schema:
                type: object
                properties:
                  articles:
                    type: array
                    items: { $ref: '#/components/schemas/Article' }
        '400':
          description: Paramètre query manquant

  /api/articles/{id}:
    get:
      tags: [Articles]
      summary: Récupérer un article par son ID
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Article trouvé
          content:
            application/json:
              schema:
                type: object
                properties:
                  article: { $ref: '#/components/schemas/Article' }
        '404':
          description: Article non trouvé
        '400':
          description: ID invalide

    put:
      tags: [Articles]
      summary: Modifier un article
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                titre:     { type: string }
                contenu:   { type: string }
                categorie: { type: string }
                tags:
                  type: array
                  items: { type: string }
      responses:
        '200':
          description: Article modifié
        '404':
          description: Article non trouvé
        '400':
          description: Données invalides

    delete:
      tags: [Articles]
      summary: Supprimer un article
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Article supprimé
        '404':
          description: Article non trouvé

components:
  schemas:
    Article:
      type: object
      properties:
        id:        { type: integer, example: 1 }
        titre:     { type: string,  example: "Introduction à Node.js" }
        contenu:   { type: string,  example: "Node.js est..." }
        auteur:    { type: string,  example: "Charles" }
        date:      { type: string,  example: "2026-03-22" }
        categorie: { type: string,  example: "Technologie" }
        tags:
          type: array
          items: { type: string }
          example: ["nodejs", "javascript"]

    ArticleInput:
      type: object
      required: [titre, contenu, auteur]
      properties:
        titre:     { type: string }
        contenu:   { type: string }
        auteur:    { type: string }
        date:      { type: string, format: date }
        categorie: { type: string }
        tags:
          type: array
          items: { type: string }
